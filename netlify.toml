[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# 重定向 API 请求到 Netlify Functions
[[redirects]]
  from = "/api/execute"
  to = "/.netlify/functions/api-execute"
  status = 200

[[redirects]]
  from = "/api/status/:execId"
  to = "/.netlify/functions/api-status?executionId=:execId"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

